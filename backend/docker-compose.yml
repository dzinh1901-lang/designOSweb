# ══════════════════════════════════════════════════════════
# DESIGNOS · Full-Stack Docker Compose  v1.1.0
#
# Services:
#   gateway      - Express API Gateway (port 4000)
#   orchestrator - FastAPI AI Orchestrator (port 8001)
#   redis        - Cache + token blacklist (port 6379)
#   kafka        - GPU job queue (port 9092)
#   zookeeper    - Kafka dependency (port 2181)
#   kafka-ui     - Kafka management UI (port 8080)
#
# Usage:
#   cp config/env.example .env     # fill in secrets
#   docker-compose up -d           # start all services
#   docker-compose logs -f gateway # tail gateway logs
#
# Note: S3, Firestore, Pinecone are external cloud services.
#       Provide credentials in .env file.
# ══════════════════════════════════════════════════════════

version: "3.9"

# ── Shared network ─────────────────────────────────────────
networks:
  designos-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# ── Volumes ────────────────────────────────────────────────
volumes:
  redis-data:
  kafka-data:
  zookeeper-data:
  gateway-logs:
  orchestrator-logs:
  uploads:

# ── Services ───────────────────────────────────────────────
services:

  # ── Express API Gateway ─────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: designos/gateway:1.1.0
    container_name: designos-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV:                    production
      PORT:                        4000
      REDIS_URL:                   redis://redis:6379
      KAFKA_BROKERS:               kafka:9092
      ORCHESTRATOR_URL:            http://orchestrator:8001
      ORCHESTRATOR_INTERNAL_SECRET: ${ORCHESTRATOR_INTERNAL_SECRET}
      JWT_SECRET:                  ${JWT_SECRET}
      JWT_EXPIRES_IN:              15m
      ENCRYPTION_KEY:              ${ENCRYPTION_KEY}
      ENCRYPTION_KEY_VERSION:      1
      HMAC_SECRET:                 ${HMAC_SECRET}
      ALLOWED_ORIGINS:             ${ALLOWED_ORIGINS:-http://localhost:3000}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/firebase-sa.json
      FIRESTORE_PROJECT_ID:        ${FIRESTORE_PROJECT_ID}
      S3_BUCKET:                   ${S3_BUCKET}
      AWS_REGION:                  ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID:           ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY:       ${AWS_SECRET_ACCESS_KEY}
      CLOUDFRONT_DOMAIN:           ${CLOUDFRONT_DOMAIN}
      KLING_API_KEY:               ${KLING_API_KEY}
      GENSPARK_API_KEY:            ${GENSPARK_API_KEY}
      ANTHROPIC_API_KEY:           ${ANTHROPIC_API_KEY}
      LOG_LEVEL:                   info
      RATE_LIMIT_MAX:              100
      RATE_LIMIT_WINDOW_MS:        900000
    volumes:
      - gateway-logs:/app/logs
      - uploads:/app/uploads
      - /run/secrets:/secrets:ro
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - designos-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # ── FastAPI AI Orchestrator ─────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    image: designos/orchestrator:1.1.0
    container_name: designos-orchestrator
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      ORCHESTRATOR_PORT:            8001
      ORCHESTRATOR_INTERNAL_SECRET: ${ORCHESTRATOR_INTERNAL_SECRET}
      ANTHROPIC_API_KEY:            ${ANTHROPIC_API_KEY}
      GENSPARK_API_KEY:             ${GENSPARK_API_KEY}
      GOOGLE_API_KEY:               ${GOOGLE_API_KEY}
      OPENAI_API_KEY:               ${OPENAI_API_KEY}
      REPLICATE_API_TOKEN:          ${REPLICATE_API_TOKEN}
      FAL_AI_KEY:                   ${FAL_AI_KEY}
      FIRESTORE_PROJECT_ID:         ${FIRESTORE_PROJECT_ID}
      ENVIRONMENT:                  production
      LOG_LEVEL:                    info
    volumes:
      - orchestrator-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - designos-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 1G

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: designos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-designos_redis_secret}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --appendonly yes
        --appendfsync everysec
        --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - designos-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-designos_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Zookeeper (Kafka dependency) ─────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: designos-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - designos-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Kafka ───────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: designos-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                      1
      KAFKA_ZOOKEEPER_CONNECT:              zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:           PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:     PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS:                 3
      KAFKA_DEFAULT_REPLICATION_FACTOR:     1
      KAFKA_LOG_RETENTION_HOURS:            168
      KAFKA_LOG_SEGMENT_BYTES:              1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:      "true"
      KAFKA_MESSAGE_MAX_BYTES:              10485760
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - designos-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ── Kafka UI (dev/ops tooling) ───────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: designos-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:            designos
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      AUTH_TYPE:                        LOGIN_FORM
      SPRING_SECURITY_USER_NAME:        admin
      SPRING_SECURITY_USER_PASSWORD:    ${KAFKA_UI_PASSWORD:-designos_kafka_ui}
    depends_on:
      - kafka
    networks:
      - designos-net
    profiles:
      - tools
